name: java project
on:
    push:
     branches: 
         - master
    workflow_dispatch:
env:
  artifact: wicket-pwnedpasswords-validator-2.0.1-SNAPSHOT.jar
  
jobs:
    java_project:
        
        strategy:
          matrix:
            os: [ubuntu-latest, ubuntu-20.04]
        runs-on: ${{matrix.os}}
        steps:
         - name: code checkout
           uses: actions/checkout@v6
         - name: install java
           uses: actions/setup-java@v5
           with:
             distribution: 'temurin' # See 'Supported distributions' for available options
             java-version: '25'
         - name: build java package
           run: mvn clean package
         - name: upload artifact
           uses: actions/upload-artifact@v4
           with:
             name: ${{env.artifact}}
             path: /home/runner/work/SonarQubeCoverageJava/SonarQubeCoverageJava/target
    



